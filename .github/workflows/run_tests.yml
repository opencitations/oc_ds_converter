name: Run tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Check the coverage
        run: uv run coverage run --rcfile=test/coverage/.coveragerc

      - name: Generate the badge
        if: matrix.python-version == '3.12'
        run: |
          mv .coverage test/coverage/
          cd test/coverage/
          rm -f coverage.svg
          uv run coverage-badge -o coverage.svg

      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12'
        with:
          name: coverage-artifact
          path: test/coverage/

  PublishBadge:
    runs-on: ubuntu-latest
    needs: CheckCoverage
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: coverage-artifact
          path: test/coverage/

      - name: Publish the badge on the GitHub repo
        run: |
          git pull
          git add test/coverage/.coverage
          git add test/coverage/coverage.svg
          git config --global user.name 'arcangelo7'
          git config --global user.email 'arcangelomas@gmail.com'
          git commit -m 'Coverage updated' || echo "No changes to commit"
          git push
