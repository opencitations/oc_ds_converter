name: Run tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_REPORT_PATH: htmlcov

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Run tests with coverage
      run: |
        uv run coverage run --rcfile=test/coverage/.coveragerc
        uv run coverage xml
        echo "=== Coverage Report ==="
        uv run coverage report
        echo "COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $4}')" >> $GITHUB_ENV

    - name: Generate HTML coverage report and badge JSON
      run: |
        uv run coverage html -d htmlcov
        COVERAGE_NUM=$(echo ${{ env.COVERAGE }} | sed 's/%//')
        if (( $(echo "$COVERAGE_NUM >= 90" | bc -l) )); then
          COLOR="green"
        elif (( $(echo "$COVERAGE_NUM >= 75" | bc -l) )); then
          COLOR="yellow"
        elif (( $(echo "$COVERAGE_NUM >= 60" | bc -l) )); then
          COLOR="orange"
        else
          COLOR="red"
        fi
        cat > htmlcov/coverage.json << EOF
        {
          "schemaVersion": 1,
          "label": "coverage",
          "message": "${{ env.COVERAGE }}",
          "color": "$COLOR"
        }
        EOF

    - name: Upload coverage artifact
      if: matrix.python-version == '3.10' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ${{ env.COVERAGE_REPORT_PATH }}
